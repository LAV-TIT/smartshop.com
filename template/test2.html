
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Item Rotation</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
    }
    #viewport {
      perspective: 800px;
    }
    #world {
      width: 300px;
      height: 300px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }
    #world img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-origin: center;
    }
  </style>
</head>
<body>

  <div id="viewport">
    <div id="world">
      <img src="https://images.pexels.com/photos/16075230/pexels-photo-16075230/free-photo-of-a-man-sitting-in-a-car.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="Rotating Image" id="rotatingImage">
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script>
    $(document).ready(function() {
      var world = $('#world'),
          image = $('#rotatingImage'),
          worldXAngle = 0,
          worldYAngle = 0;

      // Ensures requestAnimationFrame is available
      (function() {
        var lastTime = 0;
        var vendors = ['ms', 'moz', 'webkit', 'o'];
        for (var x = 0; x < vendors.length && !window.requestAnimationFrame; ++x) {
          window.requestAnimationFrame = window[vendors[x]+'RequestAnimationFrame'];
          window.cancelRequestAnimationFrame = window[vendors[x]+'CancelRequestAnimationFrame'];
        }
        if (!window.requestAnimationFrame) {
          window.requestAnimationFrame = function(callback, element) {
            var currTime = new Date().getTime();
            var timeToCall = Math.max(0, 16 - (currTime - lastTime));
            var id = window.setTimeout(function() { callback(currTime + timeToCall); }, timeToCall);
            lastTime = currTime + timeToCall;
            return id;
          };
        }
        if (!window.cancelAnimationFrame) {
          window.cancelAnimationFrame = function(id) {
            clearTimeout(id);
          };
        }
      })();

      // Mouse move event to calculate and apply rotation
      $(document).mousemove(function(e) {
        var offsetX = e.clientX / window.innerWidth;
        var offsetY = e.clientY / window.innerHeight;
        worldXAngle = (offsetY - 0.5) * 380;  // Y-axis rotation from -190 to +190 degrees
        worldYAngle = (offsetX - 0.5) * 380;  // X-axis rotation from -190 to +190 degrees
        updateView();
      });

      // Update the view with new rotation
      function updateView() {
        var transform = 'rotateX(' + worldXAngle + 'deg) rotateY(' + worldYAngle + 'deg)';
        world.css('transform', transform);
      }

      // Start the animation loop
      function update() {
        requestAnimationFrame(update);
      }
      update();
    });
  </script>
  
</body>
</html>
